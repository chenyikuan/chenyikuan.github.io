<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>净值曲线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 30px 0; }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle { color: #888; font-size: 0.95rem; }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
        }
        
        .date-range {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .date-range span { color: #666; font-size: 1.2rem; }
        
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        
        .control-group label { font-size: 0.85rem; color: #888; }
        
        input[type="date"] {
            padding: 10px 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        input[type="date"]:hover { border-color: #00d9ff; }
        input[type="date"]:focus { outline: none; border-color: #00d9ff; box-shadow: 0 0 10px rgba(0,217,255,0.3); }
        
        .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        
        button.quick-btn {
            padding: 10px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button.quick-btn:hover { border-color: #00d9ff; color: #00d9ff; }
        button.quick-btn.active { background: linear-gradient(135deg, #00d9ff, #00ff88); color: #1a1a2e; border-color: transparent; }
        
        .view-toggle { display: flex; gap: 5px; }
        
        .view-toggle button {
            padding: 10px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .view-toggle button.active { background: linear-gradient(135deg, #00d9ff, #00ff88); color: #1a1a2e; border-color: transparent; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }
        
        .stat-label { font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-value.positive { color: #00ff88; }
        .stat-value.negative { color: #ff6b6b; }
        
        .stat-date {
            font-size: 1rem;
            color: #00d9ff;
            margin-top: 5px;
            font-weight: 500;
        }
        
        .stat-percent { font-size: 0.85rem; margin-top: 5px; color: #888; }
        
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        #chart { width: 100%; height: 450px; }
        .data-info { text-align: center; color: #666; font-size: 0.85rem; margin-top: 10px; }
        .loading { text-align: center; padding: 50px; color: #888; }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .controls { flex-direction: column; align-items: stretch; }
            .date-range { flex-wrap: wrap; justify-content: center; }
            #chart { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>净值曲线</h1>
            <p class="subtitle">账户资产可视化追踪</p>
        </header>
        
        <div class="controls">
            <div class="control-group">
                <label>日期范围</label>
                <div class="date-range">
                    <input type="date" id="startDate">
                    <span>至</span>
                    <input type="date" id="endDate">
                </div>
            </div>
            <div class="control-group">
                <label>快捷选择</label>
                <div class="quick-btns">
                    <button class="quick-btn" data-range="7">近7天</button>
                    <button class="quick-btn" data-range="30">近30天</button>
                    <button class="quick-btn" data-range="90">近90天</button>
                    <button class="quick-btn active" data-range="all">全部</button>
                </div>
            </div>
            <div class="control-group">
                <label>显示模式</label>
                <div class="view-toggle">
                    <button class="active" data-view="nav">按金额</button>
                    <button data-view="return">按收益率</button>
                </div>
            </div>
            <div class="control-group">
                <label>操作</label>
                <button class="quick-btn" id="refreshBtn">刷新</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">起始日期</div>
                <div class="stat-date" id="startDateLabel">-</div>
                <div class="stat-value" id="startNav">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">终止日期</div>
                <div class="stat-date" id="endDateLabel">-</div>
                <div class="stat-value" id="currentNav">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">当日收益</div>
                <div class="stat-value" id="dailyReturn">-</div>
                <div class="stat-percent" id="dailyReturnPercent">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">区间收益</div>
                <div class="stat-value" id="totalReturn">-</div>
                <div class="stat-percent" id="totalReturnPercent">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最大回撤</div>
                <div class="stat-value negative" id="maxDrawdown">-</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div id="chart"></div>
            <p class="data-info" id="dataInfo">数据来源: nav_history.csv</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        let allData = [];
        let chart = null;
        let filteredData = [];
        let currentView = 'nav';
        let maxDrawdownZone = { start: null, end: null, depth: 0 };
        
        async function loadData() {
            try {
                const response = await fetch('./data/nav_history.csv');
                if (!response.ok) throw new Error('数据文件不存在');
                const text = await response.text();
                
                const lines = text.trim().split('\n');
                allData = [];
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',');
                    if (values.length >= 2) {
                        allData.push({ date: values[0], nav: parseFloat(values[1]) });
                    }
                }
                
                allData.sort((a, b) => new Date(a.date) - new Date(b.date));
                
                // 默认显示全部
                filterData(allData[0].date, allData[allData.length - 1].date);
                
                calculateMaxDrawdownZone();
                updateStats();
                renderChart();
            } catch (error) {
                document.getElementById('chart').innerHTML = '<div class="loading"><p>暂无数据</p></div>';
            }
        }
        
        function filterDataByDays(days) {
            const end = new Date();
            const start = new Date();
            start.setDate(start.getDate() - days);
            
            const startStr = start.toISOString().split('T')[0];
            const endStr = end.toISOString().split('T')[0];
            
            filteredData = allData.filter(d => new Date(d.date) >= start);
            updateQuickBtnState(days);
            document.getElementById('startDate').value = startStr;
            document.getElementById('endDate').value = endStr;
        }
        
        function filterData(startDate, endDate) {
            filteredData = allData.filter(d => {
                const date = new Date(d.date);
                return date >= new Date(startDate) && date <= new Date(endDate);
            });
            updateQuickBtnState(null);
            document.getElementById('startDate').value = startDate;
            document.getElementById('endDate').value = endDate;
        }
        
        function updateQuickBtnState(days) {
            document.querySelectorAll('.quick-btn[data-range]').forEach(btn => {
                btn.classList.remove('active');
                if (days !== null && btn.dataset.range == days) btn.classList.add('active');
                if (days === null && btn.dataset.range === 'all') btn.classList.add('active');
            });
        }
        
        function calculateMaxDrawdownZone() {
            if (filteredData.length === 0) return;
            let peakIdx = 0, maxDrawdown = 0, startIdx = 0, endIdx = 0;
            for (let i = 0; i < filteredData.length; i++) {
                if (filteredData[i].nav > filteredData[peakIdx].nav) peakIdx = i;
                const drawdown = (filteredData[peakIdx].nav - filteredData[i].nav) / filteredData[peakIdx].nav;
                if (drawdown > maxDrawdown) { maxDrawdown = drawdown; startIdx = peakIdx; endIdx = i; }
            }
            maxDrawdownZone = { start: startIdx, end: endIdx, depth: maxDrawdown };
        }
        
        function updateStats() {
            if (filteredData.length === 0) return;
            const startData = filteredData[0];
            const currentData = filteredData[filteredData.length - 1];
            const prevData = filteredData.length > 1 ? filteredData[filteredData.length - 2] : startData;
            
            document.getElementById('startDateLabel').textContent = startData.date;
            document.getElementById('startNav').textContent = formatNumber(startData.nav);
            
            document.getElementById('endDateLabel').textContent = currentData.date;
            document.getElementById('currentNav').textContent = formatNumber(currentData.nav);
            
            const dailyReturn = currentData.nav - prevData.nav;
            const dailyReturnPercent = ((currentData.nav / prevData.nav) - 1) * 100;
            const dailyEl = document.getElementById('dailyReturn');
            dailyEl.textContent = (dailyReturn >= 0 ? '+' : '') + formatNumber(dailyReturn);
            dailyEl.className = 'stat-value ' + (dailyReturn >= 0 ? 'positive' : 'negative');
            document.getElementById('dailyReturnPercent').textContent = (dailyReturnPercent >= 0 ? '+' : '') + dailyReturnPercent.toFixed(2) + '%';
            
            const totalReturn = currentData.nav - startData.nav;
            const totalReturnPercent = ((currentData.nav / startData.nav) - 1) * 100;
            const returnEl = document.getElementById('totalReturn');
            returnEl.textContent = (totalReturn >= 0 ? '+' : '') + formatNumber(totalReturn);
            returnEl.className = 'stat-value ' + (totalReturn >= 0 ? 'positive' : 'negative');
            document.getElementById('totalReturnPercent').textContent = (totalReturnPercent >= 0 ? '+' : '') + totalReturnPercent.toFixed(2) + '%';
            document.getElementById('maxDrawdown').textContent = '-' + (maxDrawdownZone.depth * 100).toFixed(2) + '%';
        }
        
        function formatNumber(num) {
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        
        function renderChart() {
            const chartDom = document.getElementById('chart');
            if (!chart) chart = echarts.init(chartDom);
            if (filteredData.length === 0) { chartDom.innerHTML = '<div class="loading">暂无数据</div>'; return; }
            
            const dates = filteredData.map(d => d.date);
            const baseNav = filteredData[0].nav;
            let displayData, yAxisFormatter, yAxisName;
            
            if (currentView === 'nav') {
                displayData = filteredData.map(d => d.nav);
                yAxisFormatter = v => v >= 10000 ? (v/10000).toFixed(1) + 'w' : v.toFixed(0);
                yAxisName = '净值';
            } else {
                displayData = filteredData.map(d => ((d.nav / baseNav) - 1) * 100);
                yAxisFormatter = v => v.toFixed(1) + '%';
                yAxisName = '收益率';
            }
            
            const markAreaData = maxDrawdownZone.end > maxDrawdownZone.start ? [[
                { coord: [maxDrawdownZone.start] },
                { coord: [maxDrawdownZone.end] }
            ]] : [];
            
            const option = {
                backgroundColor: 'transparent',
                grid: { left: '10%', right: '5%', top: '15%', bottom: '15%' },
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(30, 30, 50, 0.95)',
                    borderColor: '#333',
                    textStyle: { color: '#e0e0e0' },
                    formatter: function(params) {
                        const idx = params[0].dataIndex;
                        const data = filteredData[idx];
                        let html = `<strong>${data.date}</strong><br/>净值: ${formatNumber(data.nav)}<br/>`;
                        html += `区间收益: ${((data.nav / baseNav - 1) * 100).toFixed(2)}%<br/>`;
                        if (idx > 0) {
                            const prevNav = filteredData[idx - 1].nav;
                            html += `当日涨跌: ${((data.nav / prevNav - 1) * 100).toFixed(2)}%`;
                        }
                        return html;
                    }
                },
                legend: { data: [currentView === 'nav' ? '净值' : '收益率'], textStyle: { color: '#888' }, top: 0 },
                xAxis: { type: 'category', data: dates, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#888', rotate: 45 }, boundaryGap: false },
                yAxis: { type: 'value', scale: true, name: yAxisName, nameTextStyle: { color: '#888' }, splitLine: { lineStyle: { color: '#222' } }, axisLine: { lineStyle: { color: '#333' } }, axisLabel: { color: '#888', formatter: yAxisFormatter } },
                dataZoom: [{ type: 'inside', start: 0, end: 100 }, { type: 'slider', start: 0, end: 100, height: 20, bottom: 40, borderColor: '#333', fillerColor: 'rgba(0, 217, 255, 0.2)', handleStyle: { color: '#00d9ff' } }],
                series: [{
                    name: currentView === 'nav' ? '净值' : '收益率',
                    type: 'line', data: displayData, smooth: true, symbol: 'circle', symbolSize: 6,
                    lineStyle: { width: 3, color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{ offset: 0, color: '#00d9ff' }, { offset: 1, color: '#00ff88' }]) },
                    areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(0, 217, 255, 0.3)' }, { offset: 1, color: 'rgba(0, 217, 255, 0)' }]) },
                    itemStyle: { color: '#00ff88', borderWidth: 2 },
                    markArea: {
                        silent: true, data: markAreaData, itemStyle: { color: 'rgba(255, 107, 107, 0.15)' },
                        label: { show: true, position: 'top', color: '#ff6b6b', fontSize: 11, formatter: () => `最大回撤: -${(maxDrawdownZone.depth * 100).toFixed(2)}%` }
                    }
                }]
            };
            chart.setOption(option);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.quick-btn[data-range]').forEach(btn => {
                btn.addEventListener('click', function() {
                    const range = this.dataset.range;
                    if (range === 'all') filterData(allData[0].date, allData[allData.length - 1].date);
                    else filterDataByDays(parseInt(range));
                    calculateMaxDrawdownZone(); updateStats(); renderChart();
                });
            });
            
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentView = this.dataset.view;
                    renderChart();
                });
            });
            
            document.getElementById('startDate').addEventListener('change', applyDateFilter);
            document.getElementById('endDate').addEventListener('change', applyDateFilter);
            
            function applyDateFilter() {
                const start = document.getElementById('startDate').value;
                const end = document.getElementById('endDate').value;
                if (start && end && new Date(start) <= new Date(end)) {
                    filterData(start, end);
                    calculateMaxDrawdownZone(); updateStats(); renderChart();
                }
            }
            
            document.getElementById('refreshBtn').addEventListener('click', loadData);
            window.addEventListener('resize', () => { if (chart) chart.resize(); });
            loadData();
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').max = today;
            document.getElementById('endDate').max = today;
        });
    </script>
</body>
</html>
